<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Voice Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 420px;
            height: 600px;
            background: #1a1a2e;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            background: #16213e;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header .dot {
            width: 10px; height: 10px;
            background: #43e97b;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .header h2 { color: #fff; font-size: 1rem; font-weight: 600; }
        .header p { color: #7b7a99; font-size: 0.75rem; }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* Bubbles */
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.88rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .bubble.user {
            background: linear-gradient(135deg, #7c4dff, #651fff);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bubble.ai {
            background: #16213e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .bubble .label {
            font-size: 0.68rem;
            opacity: 0.6;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 5px;
            padding: 14px 16px;
            background: #16213e;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .typing span {
            width: 7px; height: 7px;
            background: #7c4dff;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }

        /* Bottom Controls */
        .controls {
            padding: 16px;
            background: #16213e;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #status {
            color: #7b7a99;
            font-size: 0.8rem;
        }

        #btn {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #7c4dff, #f06292);
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(124,77,255,0.4);
        }
        #btn:hover { transform: scale(1.08); }
        #btn.recording {
            background: linear-gradient(135deg, #ff5f5f, #ff8a65);
            animation: recordPulse 1s infinite;
        }
        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(255,95,95,0.4); }
            50%       { box-shadow: 0 4px 40px rgba(255,95,95,0.8); }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div>
            <div class="dot"></div>
        </div>
        <div>
            <h2>🎙️ AI Voice Agent</h2>
            <p>Powered by Gemini + Murf AI</p>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="bubble ai">
            <div class="label">AI</div>
            Hello! I'm your AI Voice Agent. Press the mic button and start speaking! 🎤
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <p id="status">Click mic to speak...</p>
        <button id="btn" onclick="toggleRecording()">🎤</button>
    </div>

</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let recording = false;
    const sessionId = Math.random().toString(36).substring(2);

    function addBubble(role, text) {
        const chatArea = document.getElementById("chatArea");
        const div = document.createElement("div");
        div.className = `bubble ${role}`;
        div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'AI'}</div>${text}`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById("chatArea");
        const div = document.createElement("div");
        div.className = "typing";
        div.id = "typing";
        div.innerHTML = `<span></span><span></span><span></span>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    async function toggleRecording() {
        const btn = document.getElementById("btn");
        const status = document.getElementById("status");

        if (!recording) {
            let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            recording = true;
            audioChunks = [];
            btn.textContent = "⏹";
            btn.classList.add("recording");
            status.textContent = "Recording... Click to stop";
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        } else {
            mediaRecorder.stop();
            recording = false;
            btn.textContent = "🎤";
            btn.classList.remove("recording");
            status.textContent = "Processing...";
            btn.disabled = true;

            mediaRecorder.onstop = async () => {
                let blob = new Blob(audioChunks, { type: "audio/wav" });
                let formData = new FormData();
                formData.append("audio", blob, "recording.wav");

                addBubble("user", "🎤 Voice message sent...");
                showTyping();

                try {
                    let res = await fetch(`/chat/${sessionId}`, {
                        method: "POST",
                        body: formData
                    });
                    let data = await res.json();
                    hideTyping();

                    // Update user bubble with transcription
                    const bubbles = document.querySelectorAll(".bubble.user");
                    bubbles[bubbles.length - 1].innerHTML =
                        `<div class="label">You</div>${data.transcription}`;

                    addBubble("ai", data.response);

                    if (data.audio_url) {
                        new Audio(data.audio_url).play();
                    }
                } catch(err) {
                    hideTyping();
                    addBubble("ai", "⚠️ Something went wrong. Please try again.");
                }

                btn.disabled = false;
                status.textContent = "Click mic to speak...";
            };
        }
    }
</script>
</body>
</html>
